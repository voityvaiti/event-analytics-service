services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: event_analytics
      POSTGRES_USER: event_analytics
      POSTGRES_PASSWORD: event_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_analytics -d event_analytics"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
